name: Nightly

# Two jobs:
# 1) prod-smoke — hits the live Production URL (UI only; current e2e does not create orders)
# 2) dev-suite  — local server + chatkara-dev; integration/e2e that write orders live here only
#
# Why split: a request to the Production URL always uses Production Firebase (Vercel).
# GitHub secrets cannot redirect those writes to chatkara-dev.

on:
  schedule:
    # 18:30 UTC ≈ midnight IST
    - cron: "30 18 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-tests
  cancel-in-progress: true

jobs:
  prod-smoke:
    name: Production URL smoke (no order writes)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      # Live site — uses La Gardenia Firebase on the server side.
      # Playwright suite is cart/UI only (no POST /api/orders).
      PLAYWRIGHT_BASE_URL: ${{ vars.PRODUCTION_URL || 'https://chatkara.lagardenia.in' }}
      BASE_URL: ${{ vars.PRODUCTION_URL || 'https://chatkara.lagardenia.in' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise (Node 20)
        uses: jdx/mise-action@v2
        with:
          install_args: "node@20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E against Production URL
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-prod-smoke
          path: |
            playwright-report
            test-results
          retention-days: 14

  dev-suite:
    name: Dev DB — unit, integration, e2e
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      CHATKARA_ENV: development
      CI: true
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_DEV_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_DEV_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_DEV_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_DEV_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_DEV_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_DEV_APP_ID }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
      TELEGRAM_CHAT_ID: "999001"
      TELEGRAM_WEBHOOK_SECRET: ci-telegram-webhook-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Dev Firebase secrets
        run: |
          missing=0
          for v in FIREBASE_API_KEY FIREBASE_AUTH_DOMAIN FIREBASE_PROJECT_ID FIREBASE_STORAGE_BUCKET FIREBASE_MESSAGING_SENDER_ID FIREBASE_APP_ID ADMIN_PASSWORD E2E_TEST_SECRET; do
            if [ -z "${!v}" ]; then
              echo "Missing $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Add FIREBASE_DEV_* secrets for chatkara-dev. Order-writing tests must not use Production FIREBASE_*."
            exit 1
          fi
          echo "Using Firebase project: $FIREBASE_PROJECT_ID"

      - name: Setup mise (Node 20)
        uses: jdx/mise-action@v2
        with:
          install_args: "node@20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build app
        run: npm run build

      - name: Start local server (Dev Firebase)
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 &
          echo $! > /tmp/chatkara-server.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/api/config >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Integration API tests (writes → chatkara-dev)
        run: npm run test:integration

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E against local Dev server
        run: npx playwright test --project=chromium

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/chatkara-server.pid ]; then
            kill "$(cat /tmp/chatkara-server.pid)" || true
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-dev-suite
          path: |
            playwright-report
            test-results
          retention-days: 14
